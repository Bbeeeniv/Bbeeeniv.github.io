        title: AI 占卜陪伴产品 Quin 产品策略深度分析
        link: /佟欣樾丨产品运营丨个人产品分析作品 (3).pdf
        link_text: "📄 点击此处：在线浏览完整版产品优化分析作品集（含详细数据图表与交互图）"
        caption: 2026.04 - 至今
        quote: >
          一款基于 LLM 驱动的沉浸式 AI 塔罗心理陪伴应用，致力于在高压环境下为年轻人提供低成本的数字心理疗愈。
        description: |
          针对全球超百万用户规模的头部 AI 情感陪伴应用进行独立全链路拆解：
          - **核心痛点识别**：深入泛心理疗愈与 AI 交互交叉赛道，通过社媒及访谈精准提炼 Z 世代核心诉求。
          - **商业化体验重构**：针对原有付费墙割裂体验的痛点，创新性提出“情绪保护柔性付费墙”（自动识别焦虑词并降级付费墙）与“后悔药机制”，完美平衡变现与信任。
          - **长效留存机制设计**：重构用户留存路径，策划“情绪日历与 AI 专属手写信”高价值召回机制；构建高审美“星尘”积分养成体系，成功将低频占卜转化为高频陪伴。

      - layout: left
        border: weak
        title: 小红书个人自媒体账号从 0 到 1 全链路运营
        caption: 2026.02 - 至今
        quote: >
          打造“INTP × 社会工作研究生”特色人设，聚焦人格解析、情感引导与自我成长。
        description: |
          独立负责自媒体账号全生命周期的闭环运营与策略迭代：
          - **全链路内容创作**：独立完成爆款选题策划、高质量图文产出、视觉封面设计与新媒体文案撰写。
          - **数据驱动策略迭代**：实时追踪曝光量、点击率、首页推荐占比等核心数据看板，通过严谨的数据复盘敏锐调整内容方向。
          - **项目成果**：账号帖子累计总曝光量突破 **50.6w**，单篇最高浏览量 **3.2w**，获赞与收藏近 **7.1k**；通过持续优化，成功将**首页推荐占比从 37% 飙升至 84%**。

